services:
  - type: web
    name: work-english-note
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4177
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
