services:
  - type: web
    name: work-english-note
    env: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: work-english-note-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4177
      - key: DATA_DIR
        value: /app/data
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
